name: Nightly Snapshot Build

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    branches:
      - master
      - nightly_snapshots
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  nightly:
    name: Build and Publish Nightly Snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'maven'
      - name: Compute changelog from-tag (last 3 releases)
        id: changelog_range
        run: |
          FROM_TAG=$(git tag -l 'v*' --sort=-version:refname | sed -n '4p')
          echo "FROM_TAG=${FROM_TAG}" >> $GITHUB_OUTPUT
      - name: Build Snapshot
        run: mvn -B clean package -DperformRelease=true -DskipTests=true -Dcheckstyle.skip -Dgpg.skip=true -Dchangelog.fromRef=${{ steps.changelog_range.outputs.FROM_TAG }} --file pom.xml
      - name: Get project version
        id: version
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT
      - name: Get last release tag
        id: last_release
        run: echo "TAG=$(git tag -l 'v*' --sort=-version:refname | head -1)" >> $GITHUB_OUTPUT
      - name: Delete existing nightly release and tag
        run: |
          gh release delete nightly --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Changelog
        id: github_release
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          commitMode: true
          fromTag: ${{ steps.last_release.outputs.TAG }}
          toTag: ${{ github.sha }}
          configurationJson: |
            {
              "label_extractor": [
                { "pattern": "^chore: prepare for next development iteration", "on_property": "title", "label": "skip" },
                { "pattern": "^release:.*", "on_property": "title", "label": "skip" }
              ],
              "ignore_labels": ["skip"],
              "categories": [
                { "title": "## Features",  "rules": [{ "pattern": "^feat.*", "on_property": "title" }] },
                { "title": "## Bug Fixes", "rules": [{ "pattern": "^fix.*",  "on_property": "title" }] },
                { "title": "## Chores",    "rules": [{ "pattern": "^chore.*","on_property": "title" }] }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Snapshot (${{ steps.version.outputs.VERSION }})"
          body: |
            Automated nightly snapshot build from the `${{ github.ref_name }}` branch.

            **Version:** `${{ steps.version.outputs.VERSION }}`
            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`

            ---

            ${{ steps.github_release.outputs.changelog }}
          prerelease: true
          make_latest: false
          files: ./queryeer-dist/target/queryeer-${{ steps.version.outputs.VERSION }}-dist.zip
