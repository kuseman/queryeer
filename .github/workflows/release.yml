on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
    - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

name: Create release and upload Release Asset

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Upload Release Asset
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Set version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "VERSION=${TAG/v/}" >> $GITHUB_ENV
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'maven'
      - name: Build project
        run: mvn -B clean package -DperformRelease=true -DskipTests=true -Dcheckstyle.skip --file pom.xml
      - name: Build Changelog
        id: github_release
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          commitMode: true
          configurationJson: |
            {
              "label_extractor": [
                { "pattern": "^chore: prepare for next development iteration", "on_property": "title", "label": "skip" },
                { "pattern": "^release:.*", "on_property": "title", "label": "skip" }
              ],
              "ignore_labels": ["skip"],
              "categories": [
                { "title": "## Features",  "rules": [{ "pattern": "^feat.*", "on_property": "title" }] },
                { "title": "## Bug Fixes", "rules": [{ "pattern": "^fix.*",  "on_property": "title" }] },
                { "title": "## Chores",    "rules": [{ "pattern": "^chore.*","on_property": "title" }] }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ env.VERSION }}
          body: ${{ steps.github_release.outputs.changelog }}
          draft: false
          prerelease: false
          files: ./queryeer-dist/target/queryeer-${{ env.VERSION }}-dist.zip

  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Set version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "VERSION=${TAG/v/}" >> $GITHUB_ENV
      - run: echo "Will start a Maven Central upload with tag ${VERSION}"

      - uses: actions/checkout@v4

      - name: Set up Maven Central Repository
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          cache: 'maven'

      - name: Publish package
        run: mvn --batch-mode clean deploy -DperformRelease=true -DskipTests=true -Dcheckstyle.skip
        env:
          MAVEN_USERNAME: ${{ secrets.OSS_SONATYPE_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSS_SONATYPE_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
