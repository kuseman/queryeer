name: Create Release

on:
  workflow_dispatch:
    inputs:
      increment:
        description: 'Version component to increment'
        required: true
        default: 'minor'
        type: choice
        options:
          - minor
          - major
          - patch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'maven'

      - name: Configure git
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Compute release and next snapshot versions
        id: versions
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-version:refname | head -1)
          INCREMENT="${{ github.event.inputs.increment }}"

          if [ -n "$LATEST_TAG" ]; then
            STRIPPED="${LATEST_TAG#v}"
            MAJOR=$(echo "$STRIPPED" | cut -d. -f1)
            MINOR=$(echo "$STRIPPED" | cut -d. -f2)
            PATCH=$(echo "$STRIPPED" | cut -d. -f3)
          else
            MAJOR=1; MINOR=0; PATCH=0
          fi

          case "$INCREMENT" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              NEXT_SNAPSHOT="$((MAJOR + 2)).0.0-SNAPSHOT"
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              NEXT_SNAPSHOT="${MAJOR}.${MINOR}.$((PATCH + 2))-SNAPSHOT"
              ;;
            *)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              NEXT_SNAPSHOT="${MAJOR}.$((MINOR + 2)).0-SNAPSHOT"
              ;;
          esac

          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "NEXT_SNAPSHOT=${NEXT_SNAPSHOT}" >> $GITHUB_OUTPUT
          echo "Releasing version: ${NEW_VERSION}, next snapshot: ${NEXT_SNAPSHOT}"

      - name: Set release version in pom.xml files
        run: mvn -B versions:set -DnewVersion=${{ steps.versions.outputs.NEW_VERSION }} -DgenerateBackupPoms=false

      - name: Update scm tag to release tag
        run: sed -i "s|<tag>.*</tag>|<tag>v${{ steps.versions.outputs.NEW_VERSION }}</tag>|" pom.xml

      - name: Commit and tag release
        run: |
          git add -A
          git commit -m "release: v${{ steps.versions.outputs.NEW_VERSION }}"
          git tag v${{ steps.versions.outputs.NEW_VERSION }}

      - name: Set next snapshot version in pom.xml files
        run: mvn -B versions:set -DnewVersion=${{ steps.versions.outputs.NEXT_SNAPSHOT }} -DgenerateBackupPoms=false

      - name: Reset scm tag to HEAD
        run: sed -i "s|<tag>.*</tag>|<tag>HEAD</tag>|" pom.xml

      - name: Commit next snapshot
        run: |
          git add -A
          git commit -m "chore: prepare for next development iteration"

      - name: Push commits and release tag
        run: |
          git push
          git push origin v${{ steps.versions.outputs.NEW_VERSION }}
